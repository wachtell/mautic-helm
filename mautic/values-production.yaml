replicaCount: 2

image:
  repository: mautic/mautic
  tag: "7-apache"
  pullPolicy: IfNotPresent

mautic:
  trustedProxies:
    - 127.0.0.1
    - 10.42.0.0/16
    - 192.168.3.0/24
    - 192.168.0.0/24
    - REMOTE_ADDR
  trustedHosts:
    - mautic.wachtell.net

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  
ingressRoute:
  enabled: true
  entryPoints:
    - websecure
  host: mautic.wachtell.net
  tls:
    enabled: true
    secretName: wachtell-net-tls

  middlewares: []
  annotations: {}

persistence:
  enabled: true
  createPVC: true

  storageClass: longhorn
  accessMode: ReadWriteMany

  size:
    media: 20Gi
    config: 5Gi
    data: 10Gi

  mediaClaim: ""
  configClaim: ""
  dataClaim: ""
  
resources:

  requests:
    cpu: 500m
    memory: 1Gi

  limits:
    cpu: 2
    memory: 2Gi

serviceAccount:
  create: true
  name: ""

env:
  DOCKER_MAUTIC_ROLE: mautic_web

mariadb:
  enabled: true
  image:
    repository: bitnamilegacy/mariadb
    tag: 11.8.3-debian-12-r0
  auth:
    database: mautic
    username: mautic
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 20Gi


redis:
  enabled: true
  image:
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0
  architecture: standalone
  auth:
    enabled: true
  master:
    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 5Gi

cron:
  enabled: true

  jobs:

    - name: segments-update
      schedule: "*/15 * * * *"
      command: mautic:segments:update

    - name: campaigns-update
      schedule: "*/15 * * * *"
      command: mautic:campaigns:rebuild

    - name: campaigns-trigger
      schedule: "*/5 * * * *"
      command: mautic:campaigns:trigger

    - name: messages-send
      schedule: "* * * * *"
      command: mautic:messages:send

    - name: broadcasts-send
      schedule: "* * * * *"
      command: mautic:broadcasts:send

    - name: cleanup
      schedule: "0 3 * * *"
      command: mautic:maintenance:cleanup
      
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false