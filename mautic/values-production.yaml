replicaCount: 2

image:
  repository: mautic/mautic
  tag: "7-apache"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  
ingressRoute:
  enabled: true
  entryPoints:
    - websecure
  host: mautic.wachtell.net
  tls:
    enabled: true
    secretName: wachtell-net-tls

  middlewares: []
  annotations: {}

persistence:
  enabled: true
  storageClass: longhorn
  size: 20Gi

resources:

  requests:
    cpu: 500m
    memory: 1Gi

  limits:
    cpu: 2
    memory: 2Gi

serviceAccount:
  create: true
  name: ""


mariadb:

  enabled: true

  auth:
    database: mautic
    username: mautic
   
  primary:

    persistence:
      enabled: true
      storageClass: longhorn
      size: 20Gi


redis:

  enabled: true

  architecture: standalone

  auth:
    enabled: true
    
  master:

    persistence:
      enabled: true
      storageClass: longhorn
      size: 5Gi
cron:

  enabled: true


  jobs:


    - name: segments-update

      schedule: "*/15 * * * *"

      command: mautic:segments:update



    - name: campaigns-update

      schedule: "*/15 * * * *"

      command: mautic:campaigns:update



    - name: campaigns-trigger

      schedule: "*/5 * * * *"

      command: mautic:campaigns:trigger



    - name: emails-send

      schedule: "* * * * *"

      command: mautic:emails:send



    - name: broadcasts-send

      schedule: "* * * * *"

      command: mautic:broadcasts:send



    - name: cleanup

      schedule: "0 3 * * *"

      command: mautic:maintenance:cleanup

autoscaling:

  enabled: true

  minReplicas: 2

  maxReplicas: 5

  targetCPUUtilizationPercentage: 75

pdb:

  enabled: true

  minAvailable: 1

networkPolicy:

  enabled: false