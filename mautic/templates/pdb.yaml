{{- if .Values.pdb.enabled }}

apiVersion: policy/v1

kind: PodDisruptionBudget


metadata:

  name:

    {{ include "mautic.fullname" . }}


spec:


  minAvailable:

    {{ .Values.pdb.minAvailable }}


  selector:


    matchLabels:


      {{- include "mautic.selectorLabels" . | nindent 6 }}

{{- end }}