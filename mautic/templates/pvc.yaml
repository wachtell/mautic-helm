{{- if and .Values.persistence.enabled .Values.persistence.createPVC }}

---
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: {{ include "mautic.mediaPVC" . }}
  labels:
    {{- include "mautic.labels" . | nindent 4 }}

spec:
  accessModes:
    - ReadWriteMany

  storageClassName: {{ .Values.persistence.storageClass }}

  resources:
    requests:
      storage: {{ .Values.persistence.size.media }}


---
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: {{ include "mautic.configPVC" . }}
  labels:
    {{- include "mautic.labels" . | nindent 4 }}

spec:
  accessModes:
    - ReadWriteMany

  storageClassName: {{ .Values.persistence.storageClass }}

  resources:
    requests:
      storage: {{ .Values.persistence.size.config }}


---
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: {{ include "mautic.dataPVC" . }}
  labels:
    {{- include "mautic.labels" . | nindent 4 }}

spec:
  accessModes:
    - ReadWriteMany

  storageClassName: {{ .Values.persistence.storageClass }}

  resources:
    requests:
      storage: {{ .Values.persistence.size.data }}

{{- end }}