apiVersion: apps/v1

kind: Deployment

metadata:

  name: {{ include "mautic.fullname" . }}

  labels:

    {{- include "mautic.labels" . | nindent 4 }}


spec:

  replicas: {{ .Values.replicaCount }}


  selector:

    matchLabels:

      {{- include "mautic.selectorLabels" . | nindent 6 }}


  template:

    metadata:

      labels:

        {{- include "mautic.selectorLabels" . | nindent 8 }}


    spec:
      securityContext:
            runAsUser: 33
            runAsGroup: 33
            fsGroup: 33

      containers:

      - name: mautic

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        imagePullPolicy: {{ .Values.image.pullPolicy }}


        ports:

        - name: http

          containerPort: 80


        envFrom:
        - configMapRef:
            name: {{ include "mautic.fullname" . }}-config

        - secretRef:
            name: {{ include "mautic.fullname" . }}-secret

        env:
        - name: DOCKER_MAUTIC_ROLE
          value: mautic_web


        volumeMounts:

          - name: mautic-media
            mountPath: /var/www/html/docroot/media

          - name: mautic-config
            mountPath: /var/www/html/config

          - name: mautic-data
            mountPath: /var/www/html/var


        resources:

          {{- toYaml .Values.resources | nindent 10 }}


        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6


        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 180
          periodSeconds: 30
          failureThreshold: 5

      volumes:

      - name: mautic-media
        persistentVolumeClaim:
          claimName: mautic-media

      - name: mautic-config
        persistentVolumeClaim:
          claimName: mautic-config

      - name: mautic-data
        persistentVolumeClaim:
          claimName: mautic-data