{{- if .Values.networkPolicy.enabled }}

apiVersion: networking.k8s.io/v1

kind: NetworkPolicy


metadata:

  name:

    {{ include "mautic.fullname" . }}


spec:


  podSelector:


    matchLabels:


      {{- include "mautic.selectorLabels" . | nindent 6 }}



  policyTypes:


  - Ingress

  - Egress



  ingress:


  - ports:


    - port: 80

      protocol: TCP



  egress:


  - ports:


    - port: 3306

      protocol: TCP


    - port: 6379

      protocol: TCP


    - port: 53

      protocol: UDP


{{- end }}