apiVersion: v1
kind: Pod

metadata:
  name: "{{ include "mautic.fullname" . }}-test"
  annotations:
    "helm.sh/hook": test

spec:
  restartPolicy: Never

  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - curl
        - -f
        - http://{{ include "mautic.fullname" . }}